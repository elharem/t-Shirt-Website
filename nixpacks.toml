[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader", "npm ci"]

[phases.build]
cmds = ["npm run build", "php artisan migrate --force", "php artisan storage:link --force"]

[variables]
NIXPACKS_PHP_FALLBACK_PATH = "public/index.php"

[start]
cmd = "php -S 0.0.0.0:$PORT public/index.php"